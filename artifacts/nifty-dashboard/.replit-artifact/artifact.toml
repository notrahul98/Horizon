kind = "data-app"
previewPath = "/"
title = "Nifty 150 Terminal Dashboard"
version = "1.0.0"
id = "artifacts/nifty-dashboard"
router = "path"

[[integratedSkills]]
name = "data-visualization"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20702

[services.development]
run = "exec PORT=20702 python /home/runner/workspace/stock-collector/dashboard.py"

[services.production]
build = [ "sh", "-c", "echo 'Flask dashboard - no build needed'" ]

[services.production.run]
args = [ "sh", "-c", "exec PORT=20702 python /home/runner/workspace/stock-collector/dashboard.py" ]

[services.production.run.env]
PORT = "20702"

[services.production.health.startup]
path = "/"

[services.env]
PORT = "20702"
BASE_PATH = "/"
